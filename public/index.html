        <main class="wrapper">
            <section class="quoteBox">
                <h2>Daily Motivation 💬</h2>
                <blockquote id="dailyQuote">Loading quote...</blockquote>
            </section>
            <p class="slider-legend">
                Scale: 0 – Not at all | 1 – A little | 2 – Often | 3 – Nearly all day
            </p>

            <form id="mentalHealthForm" class="formSection">
                <h2 style="padding-bottom: 1rem; ">Daily Self-Check</h2>

                <div class="formGroup">
                    <label for="mood">Did you feel down, low, or hopeless today?</label>
                    <input type="range" id="mood" class="slider" name=" mood" min="0" max="3">

                </div>
                <div class="formGroup">
                    <label for="stress">Were you feeling anxious, nervous, or stressed without a clear
                        reason?</label>
                    <input type="range" id="stress" name="stress" class="slider" min=" 0" max="3">

                </div>

                <div class="formGroup">
                    <label for="sleep">Did you feel tired or drained most of the day?</label>
                    <input type="range" id="sleep" class="slider" name="sleep" min=" 0" max="3">

                </div>

                <div class="formGroup">
                    <label for="focus">Did you find it difficult to concentrate or focus today?</label>
                    <input type="range" class="slider" id="focus" name="focus" min=" 0" max="3">

                </div>

                <div class="formGroup">
                    <label for="selfPerception">Did you feel confident and positive about yourself?</label>
                    <input type="range" class="slider" id="selfPerception" name="selfPerception" min=" 0" max="3">

                </div>
                <div class="formGroup">
                    <label for="socialConnection">Did you feel lonely or isolated today?</label>
                    <input type="range" id="socialConnection" name="socialConnection" class="slider" min=" 0" max="3">

                </div>
                <div class="formGroup">
                    <label for="functionality">Did you struggle to complete your basic daily tasks (like eating,
                        working, or
                        bathing)?</label>
                    <input type="range" id="functionality" name="functionality" class="slider" min=" 0" max="3">

                </div>
                <button type="submit" id="submit" class="btn">Submit</button>
    </div>

    </form>
